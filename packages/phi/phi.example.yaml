# Copy this file to ~/.phi/phi.yaml and adjust values for your environment.
#
# phi.yaml - operator-owned routing and agent config
#
# Core model:
#   Endpoints <-> Routes <-> Session <-> Agent(pi)
#
# Supported today:
# - agents: reusable execution config
# - chats: workspace-scoped containers
# - sessions: route-bound conversation state

---

agents:
  main:
    provider: openai
    model: gpt-5.2
    thinkingLevel: medium

  support:
    provider: openai
    model: gpt-5-mini
    thinkingLevel: off

chats:
  user-alice:
    # Workspace where .phi/ (sessions, memory, inbox, cron jobs) lives
    workspace: "~/phi/workspaces/alice"

sessions:
  alice-telegram:
    # Bind this session to one chat workspace and one agent config
    chat: user-alice
    agent: main

    # Endpoint routes for this session
    routes:
      telegram:
        id: <chat-id>
        token: <telegram-token>

  alice-cron:
    chat: user-alice
    agent: main
    cron: true
