# Copy this file to ~/.phi/phi.yaml and adjust values for your environment.
#
# phi.yaml - operator-owned routing and agent config
#
# Core model:
#   Endpoints <-> Routes <-> Chat handlers <-> Agent(pi)
#
# Supported today:
# - agents: reusable agent runtime config
# - chats: chat identities + endpoint routes

---

agents:
  main:
    provider: openai
    model: gpt-5.2
    thinkingLevel: medium

  support:
    provider: openai
    model: gpt-5-mini
    thinkingLevel: off

chats:
  user-alice:
    # Workspace where .phi/ (sessions, memory, inbox, cron jobs) lives
    workspace: "~/phi/workspaces/alice"
    # Bind this chat identity to one configured agent
    agent: main
    # Endpoint routes for this chat
    routes:
      telegram:
        id: <chat-id>
        token: <telegram-token>
